# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  jobs:
    post_create_environment:
      # Install Poetry
      - pip install poetry
      # Tell Poetry not to create a virtualenv (RTD manages its own env)
      - poetry config virtualenvs.create false
    post_install:
      # Install the package and all dependencies (including docs extras)
      - poetry install --no-interaction

mkdocs:
  configuration: mkdocs.yml
